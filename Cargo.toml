[package]
name = "vinoteca"
description = "Wine purchase tracker"
repository = "https://github.com/threecgreen/vinoteca"
version = "6.0.0"
edition = "2018"
authors = ["Carter Green <cartergr@usc.edu>"]
readme = "./README.md"
license = "MIT"
default-run = "vinoteca"
categories = ["web-programming"]

[dependencies]
# AWS access for file storage
aws-creds = "0.20.0"
aws-region = "0.20.0"
# Password encryption
bcrypt = "0.7.0"
# Datetime functionality
chrono = { version = "0.4.11", features = ["serde"] }
# basic ORM
diesel = { version = "1.4", features = ["postgres", "chrono"] }
diesel_migrations = "1.4.0"
futures = "0.3.4"
# Image handling
image = "0.23.2"
kamadak-exif = "0.5.1"
log = "0.4"
multipart-async = { version = "0.0.2", features = ["hyper", "server"] }
rocket_codegen = { git = "https://github.com/SergioBenitez/rocket", branch = "async" }
# AWS S3 access
rust-s3 = "0.20.0"
# (De)serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
time = "0.1.42"
uuid = { version = "0.8", features = ["v4"] }
# Input validation
validator = "0.10"
validator_derive = "0.10"
tokio-util = "0.3.1"

[dependencies.rocket]
git = "https://github.com/SergioBenitez/rocket"
branch = "async"
default_features = false
features = ["private-cookies"]

[dependencies.rocket_contrib]
git = "https://github.com/SergioBenitez/rocket"
branch = "async"
default-features = false
features = ["json", "diesel_postgres_pool"]

# Generate typescript type definitions from rust structs
[dependencies.typescript-definitions]
version = "0.1.10"
# Enable export in release build
features = ["export-typescript"]

[dev-dependencies]
lazy_static = "1.4.0"
